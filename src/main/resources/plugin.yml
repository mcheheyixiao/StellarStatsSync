name: StellarStatsSync
main: org.stellarvan.stellarstatssync.StellarStatsSync
version: ${version}
api-version: "1.21"
authors: [ StellarVan ]
description: "Asynchronously syncs player statistics to a remote MySQL database using HikariCP."
load: POSTWORLD

commands:
  statsync:
    description: "Player stats operations and runtime status"
    usage: "/statsync <sync|status>"
    permission: stellarstatsync.admin

permissions:
  stellarstatsync.admin:
    description: "Allows using /statsync sync and /statsync status"
    default: op
  stellarstats.admin:
    description: "Legacy alias of stellarstatsync.admin"
    default: false
    children:
      stellarstatsync.admin: true
