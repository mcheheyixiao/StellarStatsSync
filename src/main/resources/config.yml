debug: false

mysql:
  host: localhost
  port: 3306
  database: your_database
  user: your_user
  password: your_password
  maximumPoolSize: 10

# Automatic MySQL sync interval in ticks (20 ticks = 1 second, 12000 = 10 minutes).
sync_interval_ticks: 12000

websocket:
  # Keep disabled by default. To make StellarWorld show Plugin Online,
  # set websocket.enabled=true and make auth_token match one of StellarRealtime PLUGIN_TOKENS.
  enabled: false
  # Optional full address. If set, this value has priority.
  ws_url: "ws://127.0.0.1:3001/ws/plugin"
  # Optional split mode. Used when ws_url is empty.
  server_url: "ws://127.0.0.1:3001"
  path: "/ws/plugin"
  server_id: "default"
  server_name: "default"
  # Realtime auth token (legacy key name kept for backward compatibility).
  auth_token: "CHANGE_ME"
  reconnect_interval_seconds: 5
  heartbeat_interval_seconds: 20
  report_interval_seconds: 5
  sync_chat: true
  sync_player_join_quit: true
  # Legacy toggle for plugins_update. Will be merged with realtime.plugins-status.enabled.
  sync_plugin_status: true
  debug: false
  log:
    suppress_normal_reconnect: true
    reconnect_warn_threshold: 5
    reconnect_error_threshold: 15
    debug_verbose: false
  queue_limit: 1024
  connect_timeout_seconds: 10

status:
  enabled: true
  interval-seconds: 5

  # Privacy: if true, website/WebSocket center can receive current online player names.
  expose-player-list: true
  # Privacy: if true, each public player entry includes UUID.
  include-player-uuid: true

  include-motd: true
  include-tps: true

  # Optional status token. If blank, plugin falls back to websocket.auth_token and other legacy keys.
  token: ""

  server-id: "survival"
  server-name: "繁星World"
  public-host: "mc.stellarvan.cn"
  # Public display port can differ from Bukkit listening port (SRV / reverse proxy / port mapping).
  public-port: 25565

  # Fallback values are used only when Bukkit API read fails.
  fallback-online-players: 0
  fallback-max-players: 0

  http:
    # Optional website API push. Leave disabled when only using WebSocket status center.
    enabled: false
    # Example: https://www.stellarvan.cn/api/server/status/update
    endpoint: ""
    request-timeout-seconds: 8

signin:
  enabled: true
  provider: "LiteSignIn"
  require_player_online: true
  listen_litesignin_events: true
  send_game_signin_updates: true
  request_context_ttl_seconds: 15
  debug: false

realtime:
  plugins-status:
    enabled: true
    interval-seconds: 60
    include-description: false
    include-authors: false
  motd:
    # auto: config -> minimotd -> bukkit
    # config: only use values below
    # minimotd: best-effort read MiniMOTD config, fallback to bukkit
    # bukkit: Bukkit.getMotd()
    source: auto

    # When source=auto or config, this override has highest priority if not empty.
    plain: ""

    # Optional MiniMessage text for website display.
    mini-message: ""

    # Whether to try reading plugins/MiniMOTD/main.conf when MiniMOTD is installed.
    read-minimotd-config: true

    # If MiniMOTD has multiple MOTDs, use first one for stable website display.
    # Future: random can be added, but do not implement random now.
    minimotd-selection: first
